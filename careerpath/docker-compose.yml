services:
  web:
    build: .
    command: gunicorn careerpath.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  worker:
    build: .
    command: celery -A careerpath worker -l info
    env_file: .env
    depends_on:
      - db
      - redis
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mentoraa
      POSTGRES_USER: mentoraa
      POSTGRES_PASSWORD: mentoraa
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
